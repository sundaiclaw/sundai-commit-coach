<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Commit Coach</title><style>body{font-family:system-ui;max-width:920px;margin:20px auto;padding:0 14px;background:#0b1020;color:#e8eeff}textarea{width:100%;min-height:90px;background:#111938;color:#e8eeff;border:1px solid #2b3d76;border-radius:8px;padding:10px}.out{margin-top:12px;padding:12px;border:1px solid #2b3d76;border-radius:8px;background:#10182e;line-height:1.5}button{background:#5d85ff;color:#fff;border:0;padding:10px 14px;border-radius:8px;font-weight:700;cursor:pointer}</style><script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script><script src='https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js'></script></head><body><h1>Commit Coach</h1><p>Turn rough commit notes into production-ready commit plans with AI.</p><label>Diff Summary</label><textarea id='diff'>Refactored auth middleware, changed token refresh flow, updated session timeout checks.</textarea><label>Draft Commit Message</label><textarea id='msg'>fix auth stuff</textarea><p><button id='go'>Improve Commit</button></p><div id='out' class='out'>Output appears here.</div><script>const out=document.getElementById('out');const md=s=>out.innerHTML=DOMPurify.sanitize(marked.parse(s||''));go.onclick=async()=>{md('Thinking...');const r=await fetch('/api/coach',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({diff:diff.value,msg:msg.value})});const d=await r.json();md(r.ok?(d.content||'(empty)'):`Error: ${d.error||'request failed'}`);};</script></body></html>
